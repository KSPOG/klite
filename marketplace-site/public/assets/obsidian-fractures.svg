<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="stone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#02060a"/>
      <stop offset="0.48" stop-color="#071019"/>
      <stop offset="1" stop-color="#050303"/>
    </linearGradient>
    <radialGradient id="cyanGlow" cx="0" cy="0.45" r="0.62">
      <stop offset="0" stop-color="#00d9ff" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#00d9ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orangeGlow" cx="1" cy="0.48" r="0.65">
      <stop offset="0" stop-color="#ff6b16" stop-opacity="0.27"/>
      <stop offset="1" stop-color="#ff6b16" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.74" numOctaves="4" seed="19" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono">
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
    </filter>
    <filter id="cyanBloom" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="orangeBloom" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

