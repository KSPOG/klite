<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">KLite desktop client overview</title>
  <desc id="desc">A polished KLite desktop client window with cyan and orange energy, the KLite crest, status controls, and the plugin sidebar.</desc>
  <defs>
    <linearGradient id="windowBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#09121b"/>
      <stop offset="0.52" stop-color="#050a10"/>
      <stop offset="1" stop-color="#130b0a"/>
    </linearGradient>
    <linearGradient id="viewportBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#03141d"/>
      <stop offset="0.48" stop-color="#071019"/>
      <stop offset="0.52" stop-color="#100d0c"/>
      <stop offset="1" stop-color="#1a0b06"/>
    </linearGradient>
    <linearGradient id="cyanButton" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38e9ff"/>
      <stop offset="1" stop-color="#00a8d7"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#10dcff"/>
      <stop offset="0.52" stop-color="#05b4df"/>
      <stop offset="0.55" stop-color="#ff8a2c"/>
      <stop offset="1" stop-color="#ff4e08"/>
    </linearGradient>
    <radialGradient id="cyanGlow">
      <stop offset="0" stop-color="#16e3ff" stop-opacity=".72"/>
      <stop offset="1" stop-color="#16e3ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orangeGlow">
      <stop offset="0" stop-color="#ff6a18" stop-opacity=".65"/>
      <stop offset="1" stop-color="#ff6a18" stop-opacity="0"/>
    </radialGradient>
    <filter id="windowShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="30" stdDeviation="32" flood-color="#000" flood-opacity=".7"/>
    </filter>
    <filter id="cyanShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#00d7ff" flood-opacity=".52"/>
    </filter>
    <filter id="orangeShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#ff5d12" flood-opacity=".45"/>
    </filter>
    <clipPath id="viewportClip"><rect x="110" y="174" width="960" height="602" rx="12"/></clipPath>
  </defs>

  <rect width="1440" height="900" fill="#03070c"/>
  <circle cx="260" cy="740" r="380" fill="url(#cyanGlow)" opacity=".34"/>
  <circle cx="1190" cy="680" r="420" fill="url(#orangeGlow)" opacity=".31"/>
  <path d="M0 760 320 550l185 125 230-230 195 190 245-250 265 190v325H0Z" fill="#071017" opacity=".78"/>

  <g filter="url(#windowShadow)">
    <path d="M75 62H1365Q1380 62 1380 77V823Q1380 838 1365 838H75Q60 838 60 823V77Q60 62 75 62Z" fill="url(#windowBg)" stroke="#385062" stroke-width="2"/>
    <path d="M75 62H1365Q1380 62 1380 77V138H60V77Q60 62 75 62Z" fill="#111923" stroke="#293846"/>
    <circle cx="98" cy="101" r="8" fill="#ff6657"/>
    <circle cx="124" cy="101" r="8" fill="#ffc04a"/>
    <circle cx="150" cy="101" r="8" fill="#50d18c"/>
    <image href="/assets/klite-marketplace.png" x="184" y="77" width="38" height="48" preserveAspectRatio="xMidYMid meet"/>
    <text x="230" y="108" fill="#f2f7fb" font-family="Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">KLite Client</text>
    <text x="1282" y="106" fill="#778a9a" font-family="Segoe UI,Arial,sans-serif" font-size="15">Windows</text>

    <g clip-path="url(#viewportClip)">
      <rect x="110" y="174" width="960" height="602" rx="12" fill="url(#viewportBg)"/>
      <circle cx="328" cy="660" r="350" fill="url(#cyanGlow)" opacity=".58"/>
      <circle cx="885" cy="650" r="350" fill="url(#orangeGlow)" opacity=".52"/>
      <path d="M110 728 306 548l156 96 180-238 150 157 155-216 123 112v317H110Z" fill="#06131b" stroke="#08bfe8" stroke-opacity=".22"/>
      <path d="M110 766 312 608l163 91 181-212 145 142 162-196 107 92v251H110Z" fill="#140d0b" stroke="#ff641c" stroke-opacity=".2"/>
      <path d="M110 715Q325 614 513 708T892 681T1070 703" fill="none" stroke="#12d9ff" stroke-width="5" opacity=".74" filter="url(#cyanShadow)"/>
      <path d="M510 711Q710 633 890 700T1070 676" fill="none" stroke="#ff681e" stroke-width="5" opacity=".76" filter="url(#orangeShadow)"/>
      <path d="M350 354 285 453l58-19-34 84 111-129-62 16 34-78Z" fill="#11dfff" opacity=".48" filter="url(#cyanShadow)"/>
      <path d="m863 308 50 74-42-8 30 61-89-96 49 10-27-58Z" fill="#ff681c" opacity=".44" filter="url(#orangeShadow)"/>
      <image href="/assets/klite-marketplace.png" x="487" y="234" width="300" height="390" preserveAspectRatio="xMidYMid meet"/>
    </g>
    <rect x="110" y="174" width="960" height="602" rx="12" fill="none" stroke="#263a49" stroke-width="2"/>

    <g>
      <rect x="136" y="204" width="268" height="126" rx="10" fill="#061019" fill-opacity=".9" stroke="#16d8ff" stroke-opacity=".44"/>
      <text x="158" y="234" fill="#4be7ff" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="800" letter-spacing="2">KLITE STATUS</text>
      <circle cx="162" cy="269" r="7" fill="#31d46b"/>
      <text x="179" y="276" fill="#f6fafc" font-family="Segoe UI,Arial,sans-serif" font-size="20" font-weight="700">Automation ready</text>
      <text x="158" y="306" fill="#92a6b5" font-family="Segoe UI,Arial,sans-serif" font-size="15">Web walker • Marketplace • API</text>
    </g>

    <g>
      <rect x="1094" y="174" width="258" height="602" rx="12" fill="#0a1118" stroke="#293946" stroke-width="2"/>
      <text x="1118" y="216" fill="#49e5ff" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="800" letter-spacing="1.4">KLITE PLUGINS</text>

      <g transform="translate(1116 238)">
        <rect width="214" height="54" rx="8" fill="#072638" stroke="#13d9ff" stroke-opacity=".58"/>
        <rect x="12" y="12" width="30" height="30" rx="7" fill="url(#cyanButton)"/>
        <path d="M22 18v18m-5-9h10" stroke="#06212b" stroke-width="3" stroke-linecap="round"/>
        <text x="56" y="34" fill="#f3f8fb" font-family="Segoe UI,Arial,sans-serif" font-size="15" font-weight="700">Marketplace</text>
        <text x="194" y="34" fill="#45dff8" font-family="Segoe UI,Arial,sans-serif" font-size="21">›</text>
      </g>
      <g transform="translate(1116 304)">
        <rect width="214" height="54" rx="8" fill="#101821"/>
        <rect x="12" y="12" width="30" height="30" rx="7" fill="#2a160a" stroke="#ff6b1c"/>
        <path d="M27 18v18M18 27h18" stroke="#ff7b2e" stroke-width="3" stroke-linecap="round"/>
        <text x="56" y="34" fill="#dce7ed" font-family="Segoe UI,Arial,sans-serif" font-size="15">Automation</text>
        <text x="194" y="34" fill="#768995" font-family="Segoe UI,Arial,sans-serif" font-size="21">›</text>
      </g>
      <g transform="translate(1116 370)">
        <rect width="214" height="54" rx="8" fill="#101821"/>
        <rect x="12" y="12" width="30" height="30" rx="7" fill="#082417" stroke="#56d78c"/>
        <path d="m20 30 6 6 11-15" fill="none" stroke="#65e29a" stroke-width="3" stroke-linecap="round"/>
        <text x="56" y="34" fill="#dce7ed" font-family="Segoe UI,Arial,sans-serif" font-size="15">Web Walker</text>
        <text x="194" y="34" fill="#768995" font-family="Segoe UI,Arial,sans-serif" font-size="21">›</text>
      </g>
      <g transform="translate(1116 436)">
        <rect width="214" height="54" rx="8" fill="#101821"/>
        <rect x="12" y="12" width="30" height="30" rx="7" fill="#1b1030" stroke="#a879ff"/>
        <path d="m20 22-6 5 6 5m14-10 6 5-6 5m-5-15-6 20" fill="none" stroke="#b58cff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="56" y="34" fill="#dce7ed" font-family="Segoe UI,Arial,sans-serif" font-size="15">Developer API</text>
        <text x="194" y="34" fill="#768995" font-family="Segoe UI,Arial,sans-serif" font-size="21">›</text>
      </g>

      <rect x="1116" y="524" width="214" height="206" rx="10" fill="#0d1821" stroke="#243745"/>
      <text x="1136" y="557" fill="#778c9b" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1.2">CURRENT PROFILE</text>
      <text x="1136" y="592" fill="#f4f9fc" font-family="Segoe UI,Arial,sans-serif" font-size="20" font-weight="800">KSP</text>
      <text x="1136" y="621" fill="#8ca0af" font-family="Segoe UI,Arial,sans-serif" font-size="14">Marketplace connected</text>
      <rect x="1136" y="654" width="174" height="48" rx="8" fill="none" stroke="#13d9ff"/>
      <text x="1170" y="684" fill="#dff9ff" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="800">OPEN PLUGINS</text>
    </g>

    <rect x="60" y="836" width="1320" height="2" fill="url(#accent)" opacity=".85"/>
  </g>
</svg>
