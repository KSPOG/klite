      <stop offset="0" stop-color="#07111a"/>
      <stop offset="1" stop-color="#121821"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00d9ff"/>
      <stop offset="1" stop-color="#ff7426"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000" flood-opacity=".55"/></filter>
  </defs>
  <rect width="1440" height="900" fill="#05080d"/>
  <circle cx="240" cy="120" r="260" fill="#00d9ff" opacity=".07"/>
  <circle cx="1240" cy="760" r="300" fill="#ff7426" opacity=".07"/>
