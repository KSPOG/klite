    <linearGradient id="button" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#03d7ff"/><stop offset="1" stop-color="#39efcb"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#000" flood-opacity=".6"/></filter>
  </defs>
  <rect width="1440" height="900" fill="#05080d"/>
