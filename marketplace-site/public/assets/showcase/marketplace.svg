<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">KLite plugin marketplace</title>
  <desc id="desc">A dark marketplace window showing reviewed plugins, filters, account login, and Run controls.</desc>
  <defs>
