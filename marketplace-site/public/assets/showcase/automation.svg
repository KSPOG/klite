    <text x="160" y="296" fill="#8ea2b0" font-family="Segoe UI,Arial" font-size="14">Running • Mining copper</text>
    <rect x="128" y="334" width="256" height="76" rx="12" fill="#111820"/>
    <circle cx="160" cy="372" r="12" fill="#ff7b35"/>
