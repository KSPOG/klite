    <circle cx="1183" cy="104" r="7" fill="#51e0a0"/>
    <text x="1200" y="110" fill="#7cf2b8" font-family="Segoe UI,Arial" font-size="14" font-weight="700">RUNTIME READY</text>

    <rect x="106" y="164" width="300" height="638" rx="16" fill="#0c1219" stroke="#273641"/>
    <text x="136" y="204" fill="#70e1f5" font-family="Segoe UI,Arial" font-size="14" font-weight="800" letter-spacing="2">TASKS</text>
    <rect x="128" y="228" width="256" height="92" rx="12" fill="#14212a" stroke="#00caee" stroke-opacity=".5"/>
    <circle cx="160" cy="260" r="12" fill="#00cfee"/>
