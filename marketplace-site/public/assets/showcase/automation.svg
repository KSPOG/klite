      <text x="646" y="34" fill="#879ba9" font-family="Segoe UI,Arial" font-size="13">WALKER</text>
      <text x="646" y="70" fill="#ff9a62" font-family="Segoe UI,Arial" font-size="19" font-weight="800">12 TILES READY</text>
    </g>

    <rect x="430" y="484" width="440" height="318" rx="16" fill="#0c1219" stroke="#273641"/>
    <text x="462" y="524" fill="#70e1f5" font-family="Segoe UI,Arial" font-size="14" font-weight="800" letter-spacing="2">CLIENT API</text>
    <text x="462" y="560" fill="#eff5f7" font-family="Segoe UI,Arial" font-size="21" font-weight="800">Safe, detached automation surfaces</text>
