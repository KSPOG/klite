    <rect x="128" y="424" width="256" height="76" rx="12" fill="#111820"/>
    <circle cx="160" cy="462" r="12" fill="#a58aff"/>
    <text x="184" y="468" fill="#dbe5ea" font-family="Segoe UI,Arial" font-size="16">Action Bars</text>
    <rect x="128" y="514" width="256" height="76" rx="12" fill="#111820"/>
    <circle cx="160" cy="552" r="12" fill="#58d694"/>
    <text x="184" y="558" fill="#dbe5ea" font-family="Segoe UI,Arial" font-size="16">API Inspector</text>

    <rect x="128" y="626" width="256" height="144" rx="12" fill="#101922" stroke="#293a46"/>
    <text x="152" y="660" fill="#8da1af" font-family="Segoe UI,Arial" font-size="13" letter-spacing="1">GLOBAL CONTROLS</text>
    <rect x="152" y="682" width="208" height="42" rx="9" fill="url(#run)"/>
    <text x="205" y="709" fill="#061017" font-family="Segoe UI,Arial" font-size="15" font-weight="900">PAUSE ALL TASKS</text>
    <text x="152" y="750" fill="#ff8b72" font-family="Segoe UI,Arial" font-size="14">Kill switch available</text>

    <rect x="430" y="164" width="902" height="296" rx="16" fill="#0c1219" stroke="#273641"/>
    <text x="462" y="204" fill="#70e1f5" font-family="Segoe UI,Arial" font-size="14" font-weight="800" letter-spacing="2">LIVE TASK STATE</text>
    <text x="462" y="244" fill="#eff5f7" font-family="Segoe UI,Arial" font-size="24" font-weight="800">Copper and Tin Miner</text>
    <text x="462" y="278" fill="#8ea2b0" font-family="Segoe UI,Arial" font-size="15">Varrock south-east mine → Varrock East bank</text>
