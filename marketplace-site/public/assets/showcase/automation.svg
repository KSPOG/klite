    <rect x="894" y="484" width="438" height="318" rx="16" fill="#0c1219" stroke="#273641"/>
    <text x="926" y="524" fill="#70e1f5" font-family="Segoe UI,Arial" font-size="14" font-weight="800" letter-spacing="2">WALKER SNAPSHOT</text>
    <rect x="926" y="552" width="374" height="180" rx="12" fill="#132027"/>
    <path d="M950 694 C1018 620 1064 686 1126 610 S1230 610 1276 570" fill="none" stroke="#00d4f5" stroke-width="5" stroke-linecap="round" stroke-dasharray="12 12"/>
    <circle cx="950" cy="694" r="12" fill="#ff7a33"/>
    <circle cx="1276" cy="570" r="12" fill="#57dfa1"/>
    <g fill="#314b49">
      <rect x="974" y="576" width="48" height="48" rx="8"/><rect x="1042" y="648" width="48" height="48" rx="8"/><rect x="1116" y="570" width="48" height="48" rx="8"/><rect x="1190" y="638" width="48" height="48" rx="8"/>
    </g>
    <text x="926" y="766" fill="#8fa3b1" font-family="Segoe UI,Arial" font-size="15">Collision map loaded • path recalculated safely</text>
  </g>
