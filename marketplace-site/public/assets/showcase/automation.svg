<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">KLite automation and developer tools</title>
  <desc id="desc">A KLite development dashboard with automation tasks, web walker state, API methods, and runtime controls.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#08121a"/><stop offset="1" stop-color="#11131b"/></linearGradient>
    <linearGradient id="run" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#00d7ff"/><stop offset="1" stop-color="#4ce3a5"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000" flood-opacity=".58"/></filter>
  </defs>
  <rect width="1440" height="900" fill="#05080d"/>
  <circle cx="1180" cy="160" r="300" fill="#00d7ff" opacity=".05"/>
  <circle cx="170" cy="760" r="270" fill="#ff7426" opacity=".05"/>
  <g filter="url(#shadow)">
