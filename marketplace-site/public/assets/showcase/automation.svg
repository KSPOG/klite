      <text x="230" y="70" fill="#f0f5f7" font-family="Segoe UI,Arial" font-size="21" font-weight="800">18 / 28</text>
      <rect x="416" width="190" height="100" rx="12" fill="#121d25"/>
      <text x="438" y="34" fill="#879ba9" font-family="Segoe UI,Arial" font-size="13">NEXT ACTION</text>
      <text x="438" y="70" fill="#57dff4" font-family="Segoe UI,Arial" font-size="19" font-weight="800">TIN ROCK</text>
