      <rect x="462" y="586" width="376" height="40" rx="8" fill="#111c24"/>
      <text x="480" y="612" fill="#62dff3">Inventory.snapshot()</text>
      <rect x="462" y="638" width="376" height="40" rx="8" fill="#111c24"/>
      <text x="480" y="664" fill="#83e5ad">WebWalker.walkTo(point)</text>
