name: Trigger KLite walker fix

on:
  push:
    branches:
      - main
    paths:
      - ".github/trigger-klite-walker-fix"

permissions:
  actions: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch patch workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'apply-klite-walker-fix.yml',
              ref: 'main'
            });
