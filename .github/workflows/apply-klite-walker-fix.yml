name: Apply KLite walker dispatch fix

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/apply-klite-walker-fix.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch walker and inventory state
        run: |
          python <<'PY'
          from pathlib import Path

          walker_path = Path("runelite-client/src/main/java/net/runelite/client/plugins/klite/walker/DefaultWebWalker.java")
          walker = walker_path.read_text(encoding="utf-8")

          walker = walker.replace(
              "import com.google.common.util.concurrent.ThreadFactoryBuilder;\nimport java.util.List;",
              "import com.google.common.util.concurrent.ThreadFactoryBuilder;\n"
              "import java.awt.Canvas;\n"
              "import java.awt.Dimension;\n"
              "import java.awt.EventQueue;\n"
              "import java.awt.event.MouseEvent;\n"
              "import java.util.List;"
          )
          walker = walker.replace(
              "import net.runelite.api.MenuAction;\nimport net.runelite.api.Player;",
              "import net.runelite.api.Perspective;\n"
              "import net.runelite.api.Player;\n"
              "import net.runelite.api.Point;"
          )

          old_walk = '''\tprivate boolean walk(WorldPoint target, WorldPoint current, int targetIndex, int routeSize)
\t{
\t\tif (client.getTopLevelWorldView() == null)
\t\t{
\t\t\tdiagnostics.warn(LOG_SOURCE, "Cannot dispatch " + formatPoint(target)
\t\t\t\t+ " because no top-level world view is available.");
\t\t\treturn false;
\t\t}
\t\tif (target.getPlane() != client.getTopLevelWorldView().getPlane()
\t\t\t|| !WorldPoint.isInScene(client.getTopLevelWorldView(), target.getX(), target.getY()))
\t\t{
\t\t\tdiagnostics.warn(LOG_SOURCE, "Route tile " + formatPoint(target)
\t\t\t\t+ " is outside the currently loaded scene or on another plane.");
\t\t\treturn false;
\t\t}
\t\tLocalPoint local = LocalPoint.fromWorld(client.getTopLevelWorldView(), target.getX(), target.getY());
\t\tif (local == null)
\t\t{
\t\t\tdiagnostics.warn(LOG_SOURCE, "Unable to convert route tile " + formatPoint(target)
\t\t\t\t+ " to a local scene point.");
\t\t\treturn false;
\t\t}

\t\tdiagnostics.debug(LOG_SOURCE, "Dispatching adjacent route tile " + targetIndex + '/'
\t\t\t+ routeSize + ": current=" + formatPoint(current)
\t\t\t+ ", target=" + formatPoint(target)
\t\t\t+ ", scene=" + local.getSceneX() + ',' + local.getSceneY()
\t\t\t+ ", previousLocalDestination=" + formatLocalPoint(client.getLocalDestinationLocation()) + '.');
\t\tclient.menuAction(local.getSceneX(), local.getSceneY(), MenuAction.WALK,
\t\t\t0, -1, "Walk here", "");
\t\tclickTarget = target;
\t\tlastClickAt = System.currentTimeMillis();
\t\treturn true;
\t}
'''

          new_walk = '''\tprivate boolean walk(WorldPoint target, WorldPoint current, int targetIndex, int routeSize)
\t{
\t\tif (client.getTopLevelWorldView() == null)
\t\t{
\t\t\tdiagnostics.warn(LOG_SOURCE, "Cannot dispatch " + formatPoint(target)
\t\t\t\t+ " because no top-level world view is available.");
\t\t\treturn false;
\t\t}
\t\tif (target.getPlane() != client.getTopLevelWorldView().getPlane()
\t\t\t|| !WorldPoint.isInScene(client.getTopLevelWorldView(), target.getX(), target.getY()))
\t\t{
\t\t\tdiagnostics.warn(LOG_SOURCE, "Route tile " + formatPoint(target)
\t\t\t\t+ " is outside the currently loaded scene or on another plane.");
\t\t\treturn false;
\t\t}
\t\tLocalPoint local = LocalPoint.fromWorld(client.getTopLevelWorldView(), target.getX(), target.getY());
\t\tif (local == null)
\t\t{
\t\t\tdiagnostics.warn(LOG_SOURCE, "Unable to convert route tile " + formatPoint(target)
\t\t\t\t+ " to a local scene point.");
\t\t\treturn false;
\t\t}

\t\tPoint canvasPoint = Perspective.localToCanvas(client, local,
\t\t\tclient.getTopLevelWorldView().getPlane());
\t\tif (canvasPoint == null)
\t\t{
\t\t\tdiagnostics.warn(LOG_SOURCE, "Route tile " + formatPoint(target)
\t\t\t\t+ " could not be projected onto the game canvas.");
\t\t\treturn false;
\t\t}
\t\tPoint dispatchPoint = scaleForDispatch(canvasPoint);
\t\tif (!insideCanvas(dispatchPoint))
\t\t{
\t\t\tdiagnostics.warn(LOG_SOURCE, "Projected route tile " + formatPoint(target)
\t\t\t\t+ " is outside the canvas at " + dispatchPoint.getX() + ',' + dispatchPoint.getY() + '.');
\t\t\treturn false;
\t\t}

\t\tdiagnostics.debug(LOG_SOURCE, "Clicking adjacent route tile " + targetIndex + '/'
\t\t\t+ routeSize + ": current=" + formatPoint(current)
\t\t\t+ ", target=" + formatPoint(target)
\t\t\t+ ", scene=" + local.getSceneX() + ',' + local.getSceneY()
\t\t\t+ ", canvas=" + dispatchPoint.getX() + ',' + dispatchPoint.getY()
\t\t\t+ ", previousLocalDestination=" + formatLocalPoint(client.getLocalDestinationLocation()) + '.');
\t\tEventQueue.invokeLater(() -> dispatchCanvasClick(dispatchPoint));
\t\tclickTarget = target;
\t\tlastClickAt = System.currentTimeMillis();
\t\treturn true;
\t}

\tprivate Point scaleForDispatch(Point point)
\t{
\t\tif (!client.isStretchedEnabled())
\t\t{
\t\t\treturn point;
\t\t}
\t\tDimension stretched = client.getStretchedDimensions();
\t\tDimension real = client.getRealDimensions();
\t\tif (stretched == null || real == null || real.width <= 0 || real.height <= 0)
\t\t{
\t\t\treturn point;
\t\t}
\t\treturn new Point(
\t\t\t(int) ((long) point.getX() * stretched.width / real.width),
\t\t\t(int) ((long) point.getY() * stretched.height / real.height));
\t}

\tprivate boolean insideCanvas(Point point)
\t{
\t\treturn point.getX() >= 0 && point.getY() >= 0
\t\t\t&& point.getX() < client.getCanvasWidth()
\t\t\t&& point.getY() < client.getCanvasHeight();
\t}

\tprivate void dispatchCanvasClick(Point point)
\t{
\t\tCanvas canvas = client.getCanvas();
\t\tdispatchMouse(canvas, MouseEvent.MOUSE_ENTERED, point, MouseEvent.NOBUTTON, 0);
\t\tdispatchMouse(canvas, MouseEvent.MOUSE_MOVED, point, MouseEvent.NOBUTTON, 0);
\t\tdispatchMouse(canvas, MouseEvent.MOUSE_PRESSED, point, MouseEvent.BUTTON1, 1);
\t\tdispatchMouse(canvas, MouseEvent.MOUSE_RELEASED, point, MouseEvent.BUTTON1, 1);
\t\tdispatchMouse(canvas, MouseEvent.MOUSE_CLICKED, point, MouseEvent.BUTTON1, 1);
\t}

\tprivate static void dispatchMouse(Canvas canvas, int id, Point point, int button, int clickCount)
\t{
\t\tboolean focused = canvas.isFocusOwner();
\t\tboolean focusable = canvas.isFocusable();
\t\tboolean guardFocus = focusable && !focused;
\t\tif (guardFocus)
\t\t{
\t\t\tcanvas.setFocusable(false);
\t\t}
\t\ttry
\t\t{
\t\t\tcanvas.dispatchEvent(new MouseEvent(canvas, id, System.currentTimeMillis(), 0,
\t\t\t\tpoint.getX(), point.getY(), clickCount, false, button));
\t\t}
\t\tfinally
\t\t{
\t\t\tif (guardFocus)
\t\t\t{
\t\t\t\tcanvas.setFocusable(true);
\t\t\t}
\t\t}
\t}
'''

          if old_walk not in walker:
              raise SystemExit("DefaultWebWalker walk block did not match expected source")
          walker = walker.replace(old_walk, new_walk)
          walker_path.write_text(walker, encoding="utf-8")

          api_path = Path("runelite-client/src/main/java/net/runelite/client/plugins/klite/api/DefaultKLiteClientApi.java")
          api = api_path.read_text(encoding="utf-8")
          old_inventory = '''\t\t\tItemContainer inventory = client.getItemContainer(InventoryID.INV);
\t\t\tif (inventory == null)
\t\t\t{
\t\t\t\treturn 0;
\t\t\t}
'''
          new_inventory = '''\t\t\tItemContainer inventory = client.getItemContainer(InventoryID.INV);
\t\t\tif (inventory == null)
\t\t\t{
\t\t\t\t// A transiently unavailable inventory must never be reported as full.
\t\t\t\treturn 28;
\t\t\t}
'''
          if old_inventory not in api:
              raise SystemExit("inventoryFreeSlots block did not match expected source")
          api = api.replace(old_inventory, new_inventory, 1)
          api_path.write_text(api, encoding="utf-8")
          PY

      - name: Commit source fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-klite-walker-fix.yml
          git add runelite-client/src/main/java/net/runelite/client/plugins/klite/walker/DefaultWebWalker.java
          git add runelite-client/src/main/java/net/runelite/client/plugins/klite/api/DefaultKLiteClientApi.java
          git commit -m "Fix KLite canvas walking and false full inventory"
          git push origin HEAD:main
