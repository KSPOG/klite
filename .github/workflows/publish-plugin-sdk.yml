name: Publish KLite Plugin SDK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-plugin-sdk.yml"
      - "plugin-sdk/**"
      - "runelite-api/**"
      - "runelite-client/src/main/java/net/runelite/client/plugins/Plugin.java"
      - "runelite-client/src/main/java/net/runelite/client/plugins/PluginDescriptor.java"
      - "runelite-client/src/main/java/net/runelite/client/config/**"
      - "runelite-client/src/main/java/net/runelite/client/eventbus/Subscribe.java"
      - "runelite-client/src/main/java/net/runelite/client/plugins/klite/api/**"
      - "runelite-client/src/main/java/net/runelite/client/plugins/klite/automation/**"
      - "runelite-client/src/main/java/net/runelite/client/plugins/klite/walker/**"
      - "gradle/wrapper/**"
      - "gradlew"
      - "gradlew.bat"

permissions:
  contents: write

concurrency:
  group: klite-plugin-sdk
  cancel-in-progress: true

jobs:
  build-sdk:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: gradle

      - name: Show SDK build environment
        shell: bash
        run: |
          set -euxo pipefail
          java -version
          ./gradlew --version
          git rev-parse HEAD

      - name: Build RuneLite API classes
        run: ./gradlew -p runelite-api clean jar --no-daemon --stacktrace

      - name: Build approved KLite client API classes
        run: ./gradlew :client:classes --no-daemon --stacktrace

      - name: Build isolated SDK and starter ZIP
        env:
          KLITE_SDK_VERSION: 1.0.${{ github.run_number }}
        run: python3 plugin-sdk/build_sdk.py

      - name: Verify SDK archive boundaries
        shell: bash
        run: |
          set -euxo pipefail
          SDK="dist/plugin-sdk/KLite-Plugin-SDK.jar"
          STARTER="dist/plugin-sdk/KLite-Plugin-Starter.zip"
          test -f "$SDK"
          test -f "$STARTER"
          unzip -l "$SDK" | grep -q "net/runelite/client/plugins/klite/api/KLiteClientApi.class"
          unzip -l "$SDK" | grep -q "net/runelite/client/plugins/Plugin.class"
          if unzip -l "$SDK" | grep -q "net/runelite/client/plugins/klite/marketplace/"; then
            echo "Marketplace implementation classes must not be included in the SDK." >&2
            exit 1
          fi
          if unzip -l "$SDK" | grep -q "net/runelite/client/plugins/klite/update/"; then
            echo "Updater implementation classes must not be included in the SDK." >&2
            exit 1
          fi
          unzip -l "$STARTER" | grep -q "libs/KLite-Plugin-SDK.jar"
          unzip -l "$STARTER" | grep -q "src/main/resources/runelite_plugin.json"
          sha256sum "$SDK" "$STARTER"

      - name: Compile generated standalone starter
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf build/sdk-starter-verification
          mkdir -p build/sdk-starter-verification
          unzip -q dist/plugin-sdk/KLite-Plugin-Starter.zip -d build/sdk-starter-verification
          cd build/sdk-starter-verification
          chmod +x gradlew
          ./gradlew clean jar --no-daemon --stacktrace
          test -f build/libs/starter-plugin-0.1.0.jar
          if unzip -l build/libs/starter-plugin-0.1.0.jar | grep -q "net/runelite/"; then
            echo "Generated starter bundled KLite or RuneLite runtime classes." >&2
            exit 1
          fi
          unzip -l build/libs/starter-plugin-0.1.0.jar | grep -q "runelite_plugin.json"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: KLite-Plugin-SDK
          path: |
            dist/plugin-sdk/KLite-Plugin-SDK.jar
            dist/plugin-sdk/KLite-Plugin-Starter.zip
            dist/plugin-sdk/sdk-manifest.json
          if-no-files-found: error

      - name: Publish rolling SDK release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail
          SDK="dist/plugin-sdk/KLite-Plugin-SDK.jar"
          STARTER="dist/plugin-sdk/KLite-Plugin-Starter.zip"
          MANIFEST="dist/plugin-sdk/sdk-manifest.json"
          if gh release view plugin-sdk --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload plugin-sdk "$SDK" "$STARTER" "$MANIFEST" --clobber --repo "$GITHUB_REPOSITORY"
            gh release edit plugin-sdk \
              --title "KLite Plugin SDK" \
              --notes "Standalone compile-only SDK and IntelliJ/Gradle starter for building KLite plugins without access to the KLite client source or full client JAR." \
              --repo "$GITHUB_REPOSITORY"
          else
            gh release create plugin-sdk "$SDK" "$STARTER" "$MANIFEST" \
              --target "$GITHUB_SHA" \
              --title "KLite Plugin SDK" \
              --notes "Standalone compile-only SDK and IntelliJ/Gradle starter for building KLite plugins without access to the KLite client source or full client JAR." \
              --repo "$GITHUB_REPOSITORY"
          fi
