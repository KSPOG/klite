name: Publish KLite Plugin SDK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-plugin-sdk.yml"
      - "plugin-sdk/**"
      - "runelite-api/**"
      - "runelite-client/src/main/java/net/runelite/client/plugins/Plugin.java"
      - "runelite-client/src/main/java/net/runelite/client/plugins/PluginDescriptor.java"
      - "runelite-client/src/main/java/net/runelite/client/config/**"
      - "runelite-client/src/main/java/net/runelite/client/eventbus/Subscribe.java"
      - "runelite-client/src/main/java/net/runelite/client/plugins/klite/api/**"
      - "runelite-client/src/main/java/net/runelite/client/plugins/klite/automation/**"
      - "runelite-client/src/main/java/net/runelite/client/plugins/klite/walker/**"
      - "gradle/wrapper/**"
      - "gradlew"
      - "gradlew.bat"

permissions:
  contents: write

concurrency:
  group: klite-plugin-sdk
  cancel-in-progress: true

jobs:
  build-sdk:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: gradle

      - name: Show SDK build environment
        shell: bash
        run: |
          set -euxo pipefail
          java -version
          ./gradlew --version
          git rev-parse HEAD

      - name: Build RuneLite API classes
        run: ./gradlew -p runelite-api clean jar --no-daemon --stacktrace

      - name: Build approved KLite client API classes
        run: ./gradlew :client:classes --no-daemon --stacktrace

      - name: Build isolated SDK and starter ZIP
        env:
          KLITE_SDK_VERSION: 1.0.${{ github.run_number }}
        run: python3 plugin-sdk/build_sdk.py

      - name: Verify SDK archive boundaries
        shell: bash
        run: |
          set -euxo pipefail
          python3 <<'PY'
          from pathlib import Path
          from zipfile import BadZipFile, ZipFile

          sdk = Path("dist/plugin-sdk/KLite-Plugin-SDK.jar")
          starter = Path("dist/plugin-sdk/KLite-Plugin-Starter.zip")
          for archive in (sdk, starter):
              if not archive.is_file() or archive.stat().st_size == 0:
                  raise SystemExit(f"Required SDK output is missing or empty: {archive}")

          try:
              with ZipFile(sdk) as archive:
                  sdk_entries = set(archive.namelist())
                  bad_sdk_entry = archive.testzip()
              with ZipFile(starter) as archive:
                  starter_entries = set(archive.namelist())
                  bad_starter_entry = archive.testzip()
          except BadZipFile as error:
              raise SystemExit(f"Generated SDK output is not a valid ZIP/JAR: {error}") from error

          if bad_sdk_entry:
              raise SystemExit(f"SDK JAR contains a corrupt entry: {bad_sdk_entry}")
          if bad_starter_entry:
              raise SystemExit(f"Starter ZIP contains a corrupt entry: {bad_starter_entry}")

          required_sdk = {
              "net/runelite/client/plugins/klite/api/KLiteClientApi.class",
              "net/runelite/client/plugins/Plugin.class",
              "net/runelite/client/plugins/PluginDescriptor.class",
              "net/runelite/client/eventbus/Subscribe.class",
          }
          missing_sdk = sorted(required_sdk - sdk_entries)
          if missing_sdk:
              raise SystemExit(f"SDK JAR is missing required entries: {missing_sdk}")

          forbidden_prefixes = (
              "net/runelite/client/plugins/klite/marketplace/",
              "net/runelite/client/plugins/klite/update/",
              "net/runelite/client/ui/",
          )
          forbidden = sorted(
              entry for entry in sdk_entries
              if entry.endswith(".class") and entry.startswith(forbidden_prefixes)
          )
          if forbidden:
              raise SystemExit(f"Private client implementation classes entered the SDK: {forbidden[:20]}")

          required_starter = {
              "libs/KLite-Plugin-SDK.jar",
              "src/main/resources/runelite_plugin.json",
              "src/main/java/com/example/klite/StarterPlugin.java",
              "build.gradle.kts",
              "settings.gradle.kts",
              "gradlew",
              "gradlew.bat",
          }
          missing_starter = sorted(required_starter - starter_entries)
          if missing_starter:
              raise SystemExit(f"Starter ZIP is missing required entries: {missing_starter}")

          print(f"Verified SDK JAR: {len(sdk_entries)} entries, {sdk.stat().st_size} bytes")
          print(f"Verified starter ZIP: {len(starter_entries)} entries, {starter.stat().st_size} bytes")
          PY
          sha256sum dist/plugin-sdk/KLite-Plugin-SDK.jar dist/plugin-sdk/KLite-Plugin-Starter.zip

      - name: Compile generated standalone starter
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf build/sdk-starter-verification
          mkdir -p build/sdk-starter-verification
          unzip -q dist/plugin-sdk/KLite-Plugin-Starter.zip -d build/sdk-starter-verification
          cd build/sdk-starter-verification
          chmod +x gradlew
          ./gradlew clean jar --no-daemon --stacktrace
          python3 <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          plugin = Path("build/libs/starter-plugin-0.1.0.jar")
          if not plugin.is_file() or plugin.stat().st_size == 0:
              raise SystemExit(f"Generated starter plugin JAR was not produced: {plugin}")

          with ZipFile(plugin) as archive:
              entries = set(archive.namelist())
              corrupt = archive.testzip()
          if corrupt:
              raise SystemExit(f"Generated starter plugin contains a corrupt entry: {corrupt}")
          if "runelite_plugin.json" not in entries:
              raise SystemExit("Generated starter plugin is missing runelite_plugin.json")

          bundled_runtime = sorted(
              entry for entry in entries
              if entry.endswith(".class") and (
                  entry.startswith("net/runelite/")
                  or entry.startswith("com/google/inject/")
                  or entry.startswith("javax/inject/")
              )
          )
          if bundled_runtime:
              raise SystemExit(f"Generated starter bundled runtime classes: {bundled_runtime[:20]}")

          print(f"Compiled and verified starter plugin: {plugin.stat().st_size} bytes")
          PY

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: KLite-Plugin-SDK
          path: |
            dist/plugin-sdk/KLite-Plugin-SDK.jar
            dist/plugin-sdk/KLite-Plugin-Starter.zip
            dist/plugin-sdk/sdk-manifest.json
          if-no-files-found: error

      - name: Publish rolling SDK release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail
          SDK="dist/plugin-sdk/KLite-Plugin-SDK.jar"
          STARTER="dist/plugin-sdk/KLite-Plugin-Starter.zip"
          MANIFEST="dist/plugin-sdk/sdk-manifest.json"
          if gh release view plugin-sdk --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload plugin-sdk "$SDK" "$STARTER" "$MANIFEST" --clobber --repo "$GITHUB_REPOSITORY"
            gh release edit plugin-sdk \
              --title "KLite Plugin SDK" \
              --notes "Standalone compile-only SDK and IntelliJ/Gradle starter for building KLite plugins without access to the KLite client source or full client JAR." \
              --repo "$GITHUB_REPOSITORY"
          else
            gh release create plugin-sdk "$SDK" "$STARTER" "$MANIFEST" \
              --target "$GITHUB_SHA" \
              --title "KLite Plugin SDK" \
              --notes "Standalone compile-only SDK and IntelliJ/Gradle starter for building KLite plugins without access to the KLite client source or full client JAR." \
              --repo "$GITHUB_REPOSITORY"
          fi

      - name: Verify published SDK release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail
          rm -rf build/sdk-release-verification
          mkdir -p build/sdk-release-verification
          gh release download plugin-sdk \
            --pattern "KLite-Plugin-SDK.jar" \
            --pattern "KLite-Plugin-Starter.zip" \
            --pattern "sdk-manifest.json" \
            --dir build/sdk-release-verification \
            --repo "$GITHUB_REPOSITORY"
          cmp dist/plugin-sdk/KLite-Plugin-SDK.jar build/sdk-release-verification/KLite-Plugin-SDK.jar
          cmp dist/plugin-sdk/KLite-Plugin-Starter.zip build/sdk-release-verification/KLite-Plugin-Starter.zip
          cmp dist/plugin-sdk/sdk-manifest.json build/sdk-release-verification/sdk-manifest.json
          sha256sum build/sdk-release-verification/*
