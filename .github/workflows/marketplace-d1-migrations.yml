name: KLite marketplace D1 migrations

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "marketplace-site/migrations/**"
      - "marketplace-site/scripts/create-d1-ci-config.mjs"
      - ".github/workflows/marketplace-d1-migrations.yml"

permissions:
  contents: read

concurrency:
  group: klite-marketplace-d1-production
  cancel-in-progress: false

jobs:
  migrate:
    name: Apply production migrations
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: marketplace-site

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: marketplace-site/package-lock.json

      - name: Install marketplace dependencies
        run: npm ci

      - name: Validate required GitHub secrets
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
        run: |
          missing=0
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_D1_DATABASE_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not configured as a repository secret."
              missing=1
            fi
          done
          exit "$missing"

      - name: Create temporary migration configuration
        env:
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
        run: node scripts/create-d1-ci-config.mjs

      - name: Apply D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: >-
          npx wrangler d1 migrations apply klite-marketplace
          --remote
          --config wrangler.migrations-ci.json
