name: Install release preview homepage
run-name: Install the approved KLite release preview

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/install-release-preview-homepage.yml"
      - "scripts/install_release_preview.py"
      - "scripts/release-preview/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install release preview
        run: python3 scripts/install_release_preview.py

      - name: Verify generated homepage
        run: |
          grep -Fq '/release-preview.css?v=3' marketplace-site/public/index.html
          grep -Fq 'class="release-wordmark">KLite</h1>' marketplace-site/public/index.html
          grep -Fq 'class="client-window"' marketplace-site/public/index.html
          grep -Fq 'id="release-status"' marketplace-site/public/index.html
          ! grep -Fq 'class="landing-hero"' marketplace-site/public/index.html

      - name: Commit generated homepage
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add marketplace-site/public/index.html marketplace-site/public/_headers
          if git diff --cached --quiet; then
            echo "Homepage already matches the release preview."
            exit 0
          fi
          git commit -m "Replace homepage with the approved KLite release preview"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
