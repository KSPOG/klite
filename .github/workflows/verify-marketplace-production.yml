name: Verify Marketplace Production

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/verify-marketplace-production.yml"
      - "marketplace-site/public/api/**"
      - "marketplace-site/public/api-reference.css"
      - "marketplace-site/public/secondary-page-header.js"
      - "marketplace-site/worker/**"
      - "marketplace-site/wrangler.jsonc"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  statuses: write

concurrency:
  group: verify-marketplace-production
  cancel-in-progress: true

jobs:
  verify-api-page:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Mark production verification pending
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST "repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -f state=pending \
            -f context=production/api-page \
            -f description="Waiting for the live API page deployment"

      - name: Wait for and verify the production API page
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -u
          origin="https://klite-marketplace.pages.dev"
          last_diagnostic="No request completed."

          for attempt in $(seq 1 36); do
            echo "Production verification attempt ${attempt}/36"

            api_headers="$(mktemp)"
            css_headers="$(mktemp)"
            css_body="$(mktemp)"
            app_body="$(mktemp)"
            shared_body="$(mktemp)"
            page_body="$(mktemp)"

            api_status="$(curl --silent --show-error --output /dev/null --dump-header "$api_headers" --write-out '%{http_code}' "$origin/api" || true)"
            css_status="$(curl --silent --show-error --output "$css_body" --dump-header "$css_headers" --write-out '%{http_code}' "$origin/api-reference.css" || true)"
            app_status="$(curl --silent --show-error --output "$app_body" --write-out '%{http_code}' "$origin/api/app.js" || true)"
            shared_status="$(curl --silent --show-error --output "$shared_body" --write-out '%{http_code}' "$origin/secondary-page-header.js" || true)"
            page_status="$(curl --silent --show-error --output "$page_body" --write-out '%{http_code}' "$origin/api/" || true)"

            location="$(tr -d '\r' < "$api_headers" | awk 'BEGIN { IGNORECASE=1 } /^location:/ { sub(/^location:[[:space:]]*/, ""); print; exit }')"
            css_type="$(tr -d '\r' < "$css_headers" | awk 'BEGIN { IGNORECASE=1 } /^content-type:/ { sub(/^content-type:[[:space:]]*/, ""); print; exit }')"

            redirect_ok=false
            css_marker=false
            app_marker=false
            shared_marker=false
            page_marker=false

            if [[ "$api_status" == "308" ]] && [[ "$location" == "$origin/api/" || "$location" == "/api/" ]]; then
              redirect_ok=true
            fi
            if grep --fixed-strings --quiet '.api-type > summary' "$css_body"; then
              css_marker=true
            fi
            if grep --fixed-strings --quiet 'const accountStatus' "$app_body"; then
              app_marker=true
            fi
            if grep --fixed-strings --quiet 'stylesheet.href = "/api-reference.css?v=20260718-3"' "$shared_body" \
              && grep --fixed-strings --quiet 'document.querySelector("#api-expand-all")' "$shared_body"; then
              shared_marker=true
            fi
            if grep --fixed-strings --quiet 'src="/secondary-page-header.js?v=1"' "$page_body"; then
              page_marker=true
            fi

            last_diagnostic="/api=$api_status location=${location:-none}; root-css=$css_status type=${css_type:-none} marker=$css_marker; app=$app_status marker=$app_marker; shared=$shared_status marker=$shared_marker; page=$page_status marker=$page_marker"

            if [[ "$attempt" == "1" ]]; then
              gh issue comment 49 --repo "$GITHUB_REPOSITORY" --body "### Production API verification started\n\nCommit: \`$GITHUB_SHA\`\n\n\`$last_diagnostic\`"
            fi

            if [[ "$redirect_ok" == true ]] \
              && [[ "$css_status" == "200" ]] \
              && [[ "$css_type" == text/css* ]] \
              && [[ "$css_marker" == true ]] \
              && [[ "$app_status" == "200" ]] \
              && [[ "$app_marker" == true ]] \
              && [[ "$shared_status" == "200" ]] \
              && [[ "$shared_marker" == true ]] \
              && [[ "$page_status" == "200" ]] \
              && [[ "$page_marker" == true ]]; then
              echo "Production API page is loading the root stylesheet and shared controls correctly."
              gh issue comment 49 --repo "$GITHUB_REPOSITORY" --body "### Production API verification passed\n\nCommit: \`$GITHUB_SHA\`\n\n\`$last_diagnostic\`"
              exit 0
            fi

            echo "Not ready: $last_diagnostic"
            rm -f "$api_headers" "$css_headers" "$css_body" "$app_body" "$shared_body" "$page_body"
            sleep 10
          done

          gh issue comment 49 --repo "$GITHUB_REPOSITORY" --body "### Production API verification failed\n\nCommit: \`$GITHUB_SHA\`\n\nFinal response: \`$last_diagnostic\`"
          echo "Production API page did not become healthy within the verification window: $last_diagnostic" >&2
          exit 1

      - name: Mark production verification successful
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST "repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -f state=success \
            -f context=production/api-page \
            -f description="Live API page CSS and controls verified"

      - name: Mark production verification failed
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST "repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -f state=failure \
            -f context=production/api-page \
            -f description="Live API page verification failed"
