name: Apply client version, AutoLogin, and Discord updates

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  apply-and-verify:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.head_ref == 'feature/client-version-autologin-discord-updates'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/client-version-autologin-discord-updates
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: gradle

      - name: Apply deterministic feature patches
        run: |
          python .github/patches/apply-client-version-autologin.py
          python .github/patches/apply-discord-client-updates-backend.py
          python .github/patches/apply-discord-client-updates-frontend.py

      - name: Commit generated feature changes
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add client AutoLogin and Discord update notifications"
          if ! git push origin HEAD:feature/client-version-autologin-discord-updates 2>push-error.log; then
            {
              echo '### Generated source push failed'
              echo '```text'
              cat push-error.log
              echo '```'
            } > push-comment.md
            gh pr comment 57 --body-file push-comment.md
            exit 1
          fi

      - name: Verify JavaScript syntax
        run: |
          node --check marketplace-site/worker/client-updates.js
          node --check marketplace-site/worker/discord-dashboard.js
          node --check marketplace-site/worker/index.js
          node --check marketplace-site/public/app.js
          node --check marketplace-site/scripts/register-discord-commands.mjs

      - name: Run marketplace tests
        run: npm --prefix marketplace-site test

      - name: Run focused client tests
        run: |
          ./gradlew :client:test \
            --tests net.runelite.client.plugins.klite.login.KLiteAutoLoginServiceTest \
            --tests net.runelite.client.plugins.klite.marketplace.KLitePluginPanelVersionTest \
            --no-daemon

      - name: Run client static checks
        run: ./gradlew :client:checkstyleMain :client:pmdMain --no-daemon

      - name: Verify committed tree cleanliness
        run: git status --short
