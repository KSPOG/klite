name: Verify client version, AutoLogin, and Discord updates

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  verify-feature:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.head_ref == 'feature/client-version-autologin-discord-updates'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/client-version-autologin-discord-updates
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: gradle

      - name: Verify JavaScript syntax
        run: |
          node --check marketplace-site/worker/client-updates.js
          node --check marketplace-site/worker/discord-dashboard.js
          node --check marketplace-site/worker/index.js
          node --check marketplace-site/public/app.js
          node --check marketplace-site/scripts/register-discord-commands.mjs

      - name: Run marketplace tests
        id: marketplace_tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm --prefix marketplace-site test 2>&1 | tee marketplace-test.log

      - name: Upload marketplace test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: marketplace-test-log
          path: marketplace-test.log
          if-no-files-found: error

      - name: Report marketplace test failure
        if: steps.marketplace_tests.outcome == 'failure'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '### Marketplace test failure summary'
            echo '```text'
            grep -E -A 14 -B 3 'not ok|AssertionError|ReferenceError|SyntaxError|ERR_' marketplace-test.log | tail -n 180
            echo '```'
          } > marketplace-test-comment.md
          gh pr comment 57 --body-file marketplace-test-comment.md
          exit 1

      - name: Run focused client tests
        run: |
          ./gradlew :client:test \
            --tests net.runelite.client.plugins.klite.login.KLiteAutoLoginServiceTest \
            --tests net.runelite.client.plugins.klite.marketplace.KLitePluginPanelVersionTest \
            --no-daemon

      - name: Run client static checks
        run: ./gradlew :client:checkstyleMain :client:pmdMain --no-daemon

      - name: Verify committed tree cleanliness
        run: git status --short
