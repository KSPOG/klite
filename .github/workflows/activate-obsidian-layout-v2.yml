name: Activate obsidian layout v2
run-name: Activate the replacement obsidian website layout

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/activate-obsidian-layout-v2.yml"

permissions:
  contents: write

jobs:
  activate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load layout v2 after the route theme
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          css = Path('marketplace-site/public/obsidian-site-routes.css')
          text = css.read_text('utf-8')
          import_line = '@import url("/obsidian-layout-v2.css?v=release-20260718-1");\n\n'
          text = text.replace('@import url("/obsidian-layout-v2.css?v=release-20260718-1");\n\n', '')
          css.write_text(import_line + text, 'utf-8')

          headers = Path('marketplace-site/public/_headers')
          value = headers.read_text('utf-8')
          route = '/obsidian-layout-v2.css'
          if f'\n{route}\n' not in '\n' + value:
              value += (
                  f'\n{route}\n'
                  '  Cache-Control: no-store, no-cache, must-revalidate, max-age=0\n'
                  '  Pragma: no-cache\n'
                  '  Expires: 0\n'
              )
          headers.write_text(value.rstrip() + '\n', 'utf-8')
          PY

      - name: Verify final layout order
        shell: bash
        run: |
          set -euo pipefail
          head -n 1 marketplace-site/public/obsidian-site-routes.css | grep -F 'obsidian-layout-v2.css?v=release-20260718-1'
          test -s marketplace-site/public/obsidian-layout-v2.css

      - name: Commit activation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/activate-obsidian-layout-v2.yml
          git add marketplace-site/public/obsidian-site-routes.css marketplace-site/public/_headers
          git commit -m "Activate obsidian layout v2 [skip ci]"
          git push
