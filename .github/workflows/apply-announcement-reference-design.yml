name: Apply announcement reference design
run-name: Replace website with the approved announcement composition

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/apply-announcement-reference-design.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wire the announcement design into every page
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          public = Path('marketplace-site/public')
          links = [
              '  <link rel="stylesheet" href="/announcement-shell.css?v=1">',
              '  <link rel="stylesheet" href="/announcement-hero.css?v=1">',
              '  <link rel="stylesheet" href="/announcement-cards.css?v=1">',
              '  <link rel="stylesheet" href="/announcement-docs.css?v=1">',
          ]

          for path in sorted(public.rglob('*.html')):
              text = path.read_text('utf-8')
              text = '\n'.join(line for line in text.splitlines() if 'announcement-' not in line)
              text = text.replace('</head>', '\n'.join(links) + '\n</head>', 1)
              if path == public / 'index.html':
                  text = text.replace(
                      '<p class="eyebrow">Focused RuneLite-based client</p>',
                      '<p class="eyebrow">KLite desktop client</p>'
                  )
                  text = text.replace(
                      '<h1 id="hero-title"><span>KLite for</span><strong>Windows.</strong></h1>',
                      '<h1 id="hero-title"><span>KLite</span><strong>Client.</strong></h1>'
                  )
                  text = text.replace(
                      'A focused desktop client with reviewed marketplace plugins, automation-safe APIs, an integrated web walker, and owner-controlled publishing.',
                      'A modern, performance-focused RuneLite client.'
                  )
                  text = text.replace('Download KLite .exe', 'Download for Windows')
                  text = text.replace('Explore marketplace', 'Explore Marketplace')
              path.write_text(text + '\n', 'utf-8')

          routes = public / 'obsidian-site-routes.css'
          route_text = routes.read_text('utf-8')
          route_text = '\n'.join(
              line for line in route_text.splitlines()
              if 'obsidian-layout-v2.css' not in line
          ).lstrip() + '\n'
          routes.write_text(route_text, 'utf-8')

          headers = public / '_headers'
          value = headers.read_text('utf-8')
          for route in ('/announcement-shell.css','/announcement-hero.css','/announcement-cards.css','/announcement-docs.css'):
              if f'\n{route}\n' not in '\n' + value:
                  value += f'\n{route}\n  Cache-Control: no-store, no-cache, must-revalidate, max-age=0\n  Pragma: no-cache\n  Expires: 0\n'
          headers.write_text(value.rstrip() + '\n', 'utf-8')
          PY

      - name: Verify the final composition
        shell: bash
        run: |
          set -euo pipefail
          grep -F '<span>KLite</span><strong>Client.</strong>' marketplace-site/public/index.html
          ! grep -Fq 'obsidian-layout-v2.css' marketplace-site/public/obsidian-site-routes.css
          for file in marketplace-site/public/*.html marketplace-site/public/api/index.html marketplace-site/public/docs/index.html; do
            grep -Fq '/announcement-shell.css?v=1' "$file"
            grep -Fq '/announcement-docs.css?v=1' "$file"
          done

      - name: Commit the announcement-based website
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-announcement-reference-design.yml
          git add marketplace-site/public
          git commit -m "Use the approved announcement design across the website [skip ci]"
          git push
