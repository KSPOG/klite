name: Build KLite Windows client

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-windows-client.yml"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - "runelite-client/**"
      - "runelite-api/**"

permissions:
  contents: write

concurrency:
  group: klite-windows-client
  cancel-in-progress: true

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 11 for the KLite build
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: gradle

      - name: Build the executable KLite JAR
        shell: pwsh
        run: .\gradlew.bat :client:shadowJar --no-daemon

      - name: Prepare packaging input
        shell: pwsh
        run: |
          $jar = Get-ChildItem "runelite-client\build\libs\klite-*.jar" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $jar) {
            throw "The KLite shaded JAR was not produced."
          }
          New-Item -ItemType Directory -Force -Path "package-input" | Out-Null
          Copy-Item $jar.FullName "package-input\KLite.jar"
          Write-Host "Packaging $($jar.FullName)"

      - name: Set up Java 21 for jpackage
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          choco install wixtoolset --no-progress -y
          $wix = "C:\Program Files (x86)\WiX Toolset v3.14\bin"
          if (-not (Test-Path $wix)) {
            $wix = "C:\Program Files (x86)\WiX Toolset v3.11\bin"
          }
          if (Test-Path $wix) {
            $wix | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }

      - name: Package KLite installer
        shell: pwsh
        run: |
          $appVersion = "1.0.$env:GITHUB_RUN_NUMBER"
          "KLITE_APP_VERSION=$appVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Packaging KLite version $appVersion"

          New-Item -ItemType Directory -Force -Path "dist" | Out-Null
          jpackage `
            --type exe `
            --dest dist `
            --input package-input `
            --name KLite `
            --main-jar KLite.jar `
            --main-class net.runelite.client.KLite `
            --app-version $appVersion `
            --vendor KLite `
            --description "KLite RuneLite-based desktop client" `
            --win-per-user-install `
            --win-dir-chooser `
            --win-menu `
            --win-menu-group KLite `
            --win-shortcut `
            --win-upgrade-uuid "8f8e4eb1-3d18-4aac-8f86-6ab22b8a5c17" `
            --java-options "-Xmx1024m"

          $installer = Get-ChildItem "dist\*.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "jpackage did not produce a Windows installer."
          }
          Move-Item $installer.FullName "dist\KLite-Setup.exe" -Force
          Get-FileHash "dist\KLite-Setup.exe" -Algorithm SHA256

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: KLite-Windows-Installer
          path: dist/KLite-Setup.exe
          if-no-files-found: error

      - name: Publish rolling Windows release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $asset = (Resolve-Path "dist\KLite-Setup.exe").Path
          gh release view windows-client --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload windows-client $asset --clobber --repo $env:GITHUB_REPOSITORY
            gh release edit windows-client --latest --repo $env:GITHUB_REPOSITORY
          } else {
            gh release create windows-client $asset `
              --target $env:GITHUB_SHA `
              --title "KLite Windows Client" `
              --notes "Rolling Windows installer for the current KLite main branch. Download KLite-Setup.exe and run it to install the client." `
              --latest `
              --repo $env:GITHUB_REPOSITORY
          }

      - name: Generate verified update manifest
        shell: pwsh
        run: |
          $installer = Get-Item "dist\KLite-Setup.exe"
          $hash = (Get-FileHash $installer.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          $manifest = [ordered]@{
            schemaVersion = 1
            platform = "windows-x64"
            version = $env:KLITE_APP_VERSION
            buildSha = $env:GITHUB_SHA
            downloadUrl = "https://klite-marketplace.pages.dev/download/windows"
            sha256 = $hash
            size = $installer.Length
            publishedAt = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          }
          $directory = "marketplace-site\public\client\windows"
          New-Item -ItemType Directory -Force -Path $directory | Out-Null
          $manifest | ConvertTo-Json | Set-Content `
            -Path "$directory\latest.json" `
            -Encoding utf8
          Get-Content "$directory\latest.json"

      - name: Commit update manifest
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add marketplace-site/public/client/windows/latest.json
          if (git diff --cached --quiet) {
            Write-Host "The update manifest is already current."
            exit 0
          }
          git commit -m "Publish KLite Windows update manifest"
          git push origin HEAD:main
