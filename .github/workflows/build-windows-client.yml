name: Build KLite Windows client

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-windows-client.yml"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - "runelite-client/**"
      - "runelite-api/**"

permissions:
  contents: write

concurrency:
  group: klite-windows-client
  cancel-in-progress: true

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 11 for the KLite build
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: gradle

      - name: Validate committed KLite splash icon
        shell: pwsh
        run: |
          $iconPath = "runelite-client\src\main\resources\net\runelite\client\ui\klite_icon.png"
          if (-not (Test-Path $iconPath -PathType Leaf)) {
            throw "The committed KLite splash icon is missing: $iconPath"
          }

          $bytes = [IO.File]::ReadAllBytes($iconPath)
          $pngSignature = [byte[]](137, 80, 78, 71, 13, 10, 26, 10)
          if ($bytes.Length -lt $pngSignature.Length) {
            throw "The committed KLite splash icon is empty or truncated."
          }
          for ($index = 0; $index -lt $pngSignature.Length; $index++) {
            if ($bytes[$index] -ne $pngSignature[$index]) {
              throw "The committed KLite splash icon is not a valid PNG file."
            }
          }

          Write-Host "Validated committed KLite splash icon: $($bytes.Length) bytes"

      - name: Verify Discord-only marketplace login
        shell: pwsh
        run: |
          $panelPath = "runelite-client\src\main\java\net\runelite\client\plugins\klite\marketplace\KLiteAccountPanel.java"
          $panel = Get-Content $panelPath -Raw

          foreach ($required in @("KLiteDiscordLoginFlow", "Continue with Discord")) {
            if (-not $panel.Contains($required)) {
              throw "The Windows client is missing required Discord login source: $required"
            }
          }

          foreach ($forbidden in @("JPasswordField", "JTextField", "accountService.login(")) {
            if ($panel.Contains($forbidden)) {
              throw "Password login source must not be included in the published Windows client: $forbidden"
            }
          }

          Write-Host "Verified Discord-only KLite marketplace login UI."

      - name: Build the executable KLite JAR from a clean checkout
        shell: pwsh
        run: .\gradlew.bat clean :client:shadowJar --no-daemon --no-build-cache

      - name: Verify embedded client build and Discord classes
        shell: pwsh
        run: |
          $jar = Get-ChildItem "runelite-client\build\libs\klite-*.jar" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $jar) {
            throw "The KLite shaded JAR was not produced."
          }

          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $archive = [IO.Compression.ZipFile]::OpenRead($jar.FullName)
          try {
            $propertiesEntry = $archive.GetEntry("net/runelite/client/runelite.properties")
            if (-not $propertiesEntry) {
              throw "The packaged client is missing runelite.properties."
            }

            $reader = [IO.StreamReader]::new($propertiesEntry.Open())
            try {
              $properties = $reader.ReadToEnd()
            } finally {
              $reader.Dispose()
            }

            $expectedCommit = $env:GITHUB_SHA.Substring(0, 7).ToLowerInvariant()
            $commitMatch = [regex]::Match($properties, '(?m)^runelite\.commit=(.+)$')
            if (-not $commitMatch.Success) {
              throw "The packaged client does not contain an embedded commit."
            }
            $actualCommit = $commitMatch.Groups[1].Value.Trim().ToLowerInvariant()
            if ($actualCommit -ne $expectedCommit) {
              throw "Stale client JAR: embedded commit $actualCommit does not match workflow commit $expectedCommit."
            }

            foreach ($className in @(
              "net/runelite/client/plugins/klite/marketplace/KLiteAccountPanel.class",
              "net/runelite/client/plugins/klite/marketplace/KLiteDiscordLoginFlow.class",
              "net/runelite/client/plugins/klite/marketplace/KLiteDiscordAccountClient.class"
            )) {
              if (-not $archive.GetEntry($className)) {
                throw "The packaged client is missing required Discord login class: $className"
              }
            }

            Write-Host "Verified packaged client commit $actualCommit and Discord-only login classes."
          } finally {
            $archive.Dispose()
          }

      - name: Prepare packaging input
        shell: pwsh
        run: |
          $jar = Get-ChildItem "runelite-client\build\libs\klite-*.jar" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $jar) {
            throw "The KLite shaded JAR was not produced."
          }
          New-Item -ItemType Directory -Force -Path "package-input" | Out-Null
          Copy-Item $jar.FullName "package-input\KLite.jar"
          Write-Host "Packaging $($jar.FullName)"

      - name: Set up Java 21 for jpackage
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Prepare supplied KLite native Windows icon
        shell: pwsh
        run: |
          python -m pip install --disable-pip-version-check --quiet pillow
          New-Item -ItemType Directory -Force -Path "build\packaging" | Out-Null
          @'
          from pathlib import Path
          from PIL import Image

          source = Path("runelite-client/src/main/resources/net/runelite/client/ui/klite_icon.png")
          output = Path("build/packaging/KLite.ico")
          if not source.is_file():
              raise SystemExit(f"KLite splash icon is missing: {source}")

          image = Image.open(source).convert("RGBA")
          side = max(image.size)
          square = Image.new("RGBA", (side, side), (0, 0, 0, 0))
          square.alpha_composite(image, ((side - image.width) // 2, (side - image.height) // 2))
          icon = square.resize((256, 256), Image.Resampling.LANCZOS)
          icon.save(output, format="ICO", sizes=[
              (16, 16), (24, 24), (32, 32), (48, 48),
              (64, 64), (128, 128), (256, 256)
          ])
          print(f"Prepared native icon: {output} ({output.stat().st_size} bytes)")
          '@ | Set-Content -Path "build\packaging\create_klite_icon.py" -Encoding utf8
          python "build\packaging\create_klite_icon.py"
          if (-not (Test-Path "build\packaging\KLite.ico")) {
            throw "The KLite Windows icon was not produced."
          }

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          choco install wixtoolset --no-progress -y
          $wix = "C:\Program Files (x86)\WiX Toolset v3.14\bin"
          if (-not (Test-Path $wix)) {
            $wix = "C:\Program Files (x86)\WiX Toolset v3.11\bin"
          }
          if (Test-Path $wix) {
            $wix | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }

      - name: Build native KLite.exe application image
        shell: pwsh
        run: |
          $appVersion = "1.0.$env:GITHUB_RUN_NUMBER"
          "KLITE_APP_VERSION=$appVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Packaging KLite version $appVersion"

          New-Item -ItemType Directory -Force -Path "app-image" | Out-Null
          jpackage `
            --type app-image `
            --dest app-image `
            --input package-input `
            --name KLite `
            --main-jar KLite.jar `
            --main-class net.runelite.client.KLite `
            --app-version $appVersion `
            --vendor KLite `
            --description "KLite RuneLite-based desktop client" `
            --icon "build\packaging\KLite.ico" `
            --java-options "-Xmx1024m"

          $launcher = "app-image\KLite\KLite.exe"
          if (-not (Test-Path $launcher)) {
            throw "jpackage did not produce the native KLite.exe launcher."
          }
          $launcherItem = Get-Item $launcher
          if ($launcherItem.Extension -ne ".exe") {
            throw "The installed KLite launcher is not a Windows executable."
          }
          Write-Host "Native launcher: $($launcherItem.FullName)"
          Get-FileHash $launcherItem.FullName -Algorithm SHA256

      - name: Package KLite.exe Windows installer and portable application
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist" | Out-Null
          jpackage `
            --type exe `
            --dest dist `
            --name KLite `
            --app-image "app-image\KLite" `
            --app-version $env:KLITE_APP_VERSION `
            --vendor KLite `
            --description "KLite RuneLite-based desktop client" `
            --win-per-user-install `
            --win-dir-chooser `
            --win-menu `
            --win-menu-group KLite `
            --win-shortcut `
            --win-upgrade-uuid "8f8e4eb1-3d18-4aac-8f86-6ab22b8a5c17"

          $installer = Get-ChildItem "dist\*.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "jpackage did not produce a Windows installer."
          }
          Move-Item $installer.FullName "dist\KLite-Setup.exe" -Force

          Compress-Archive -Path "app-image\KLite\*" -DestinationPath "dist\KLite-Portable.zip" -Force
          Get-FileHash "dist\KLite-Setup.exe" -Algorithm SHA256
          Get-FileHash "app-image\KLite\KLite.exe" -Algorithm SHA256

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KLite-Windows-Packages
          path: |
            dist/KLite-Setup.exe
            dist/KLite-Portable.zip
          if-no-files-found: error

      - name: Publish rolling Windows release staging assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $installer = (Resolve-Path "dist\KLite-Setup.exe").Path
          $portable = (Resolve-Path "dist\KLite-Portable.zip").Path
          gh release view windows-client --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload windows-client $installer $portable --clobber --repo $env:GITHUB_REPOSITORY
            gh release edit windows-client --latest --repo $env:GITHUB_REPOSITORY
          } else {
            gh release create windows-client $installer $portable `
              --target $env:GITHUB_SHA `
              --title "KLite Windows Client" `
              --notes "Rolling staging packages. The synchronization workflow publishes a content-addressed installer and the verified update manifest after this build completes." `
              --latest `
              --repo $env:GITHUB_REPOSITORY
          }

          Write-Host "The synchronization workflow will publish the immutable installer and update manifest."
