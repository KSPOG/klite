name: Verify KLite Plugin Starter README

on:
  pull_request:
    paths:
      - ".github/workflows/verify-plugin-starter-readme.yml"
      - "plugin-sdk/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/verify-plugin-starter-readme.yml"
      - "plugin-sdk/**"

permissions:
  contents: read

jobs:
  verify-starter-readme:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate and inspect starter ZIP README
        run: python3 plugin-sdk/verify_starter_readme.py
