name: Finalize KLite Plugin SDK Release

on:
  workflow_run:
    workflows:
      - Publish KLite Plugin SDK
    types:
      - completed

permissions:
  contents: write

jobs:
  update-release-tag:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      contains(fromJSON('["push", "workflow_dispatch"]'), github.event.workflow_run.event)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      VERIFIED_COMMIT: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Check out the verified SDK source commit
        uses: actions/checkout@v4
        with:
          ref: ${{ env.VERIFIED_COMMIT }}
          fetch-depth: 0

      - name: Point the rolling SDK release tag at the verified build
        shell: bash
        run: |
          set -euxo pipefail
          git tag --force plugin-sdk "$VERIFIED_COMMIT"
          git push --force origin refs/tags/plugin-sdk
          test "$(git rev-parse plugin-sdk^{commit})" = "$VERIFIED_COMMIT"
