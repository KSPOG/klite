name: Apply verified KLite PMD fixes
run-name: Apply and verify KLite PMD fixes

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/apply-klite-pmd-fixes.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Apply exact PMD fixes
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text("utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"Expected exactly one match in {path}, found {count}: {old!r}")
              file.write_text(text.replace(old, new, 1), "utf-8")

          replace_once(
              "runelite-client/src/main/java/net/runelite/client/plugins/klite/debug/KLiteClientLogBuffer.java",
              "appender = new AppenderBase<ILoggingEvent>()",
              "appender = new AppenderBase<>()",
          )

          replace_once(
              "runelite-client/src/main/java/net/runelite/client/plugins/klite/marketplace/KLiteMarketplacePersistenceService.java",
              "private int schemaVersion = 1;",
              "private final int schemaVersion = 1;",
          )

          streamed = "runelite-client/src/main/java/net/runelite/client/plugins/klite/marketplace/KLiteStreamedPluginService.java"
          replace_once(
              streamed,
              '''\t\tcatch (Exception ex)\n\t\t{\n\t\t\tnotifyChanged();\n\t\t\treturn failedFuture(ex instanceof RuntimeException ? ex\n\t\t\t\t: new IllegalStateException(describe(ex), ex));\n\t\t}''',
              '''\t\tcatch (PluginInstantiationException ex)\n\t\t{\n\t\t\tnotifyChanged();\n\t\t\treturn failedFuture(new IllegalStateException(describe(ex), ex));\n\t\t}''',
          )
          replace_once(
              streamed,
              '''\t\tcatch (IOException | ClassNotFoundException | PluginInstantiationException ex)\n\t\t{\n\t\t\tcleanupFailedLoad(classLoader, plugins);\n\t\t\tthrow new IllegalStateException("Unable to load marketplace plugin: " + describe(ex), ex);\n\t\t}\n\t\tcatch (RuntimeException | LinkageError ex)\n\t\t{\n\t\t\tcleanupFailedLoad(classLoader, plugins);\n\t\t\tthrow new IllegalStateException("Unable to load marketplace plugin: " + describe(ex), ex);\n\t\t}''',
              '''\t\tcatch (IOException | ClassNotFoundException | PluginInstantiationException\n\t\t\t| RuntimeException | LinkageError ex)\n\t\t{\n\t\t\tcleanupFailedLoad(classLoader, plugins);\n\t\t\tthrow new IllegalStateException("Unable to load marketplace plugin: " + describe(ex), ex);\n\t\t}''',
          )
          replace_once(
              streamed,
              '''\t\t\tThrowable cause = ex.getCause();\n\t\t\tif (cause instanceof PluginOperationRuntimeException)\n\t\t\t{\n\t\t\t\tthrow new PluginInstantiationException(cause.getCause());\n\t\t\t}\n\t\t\tthrow new PluginInstantiationException(cause);''',
              '''\t\t\tThrowable cause = ex.getCause();\n\t\t\tif (cause instanceof PluginOperationRuntimeException\n\t\t\t\t&& cause.getCause() instanceof PluginInstantiationException)\n\t\t\t{\n\t\t\t\tthrow (PluginInstantiationException) cause.getCause();\n\t\t\t}\n\t\t\tthrow new PluginInstantiationException(ex);''',
          )
          replace_once(
              streamed,
              "void run() throws Exception;",
              "void run() throws PluginInstantiationException;",
          )
          PY

      - name: Verify PMD
        shell: bash
        run: ./gradlew :client:pmdMain --no-daemon

      - name: Commit verified fixes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-klite-pmd-fixes.yml
          git add runelite-client/src/main/java/net/runelite/client/plugins/klite/debug/KLiteClientLogBuffer.java
          git add runelite-client/src/main/java/net/runelite/client/plugins/klite/marketplace/KLiteMarketplacePersistenceService.java
          git add runelite-client/src/main/java/net/runelite/client/plugins/klite/marketplace/KLiteStreamedPluginService.java
          git commit -m "Fix KLite PMD violations blocking CI"
          git push