name: Fix credit-related CI failures

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/fix-credit-related-ci.yml"
      - "scripts/fix_credit_related_ci.py"

permissions:
  contents: write

concurrency:
  group: fix-credit-related-ci
  cancel-in-progress: false

jobs:
  fix-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Apply PMD corrections
        run: python scripts/fix_credit_related_ci.py

      - name: Verify client PMD
        run: |
          chmod +x gradlew
          ./gradlew :client:pmdMain --no-daemon

      - name: Commit corrections
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            runelite-client/src/main/java/net/runelite/client/externalplugins/KLiteDevelopmentPluginManager.java \
            runelite-client/src/main/java/net/runelite/client/plugins/klite/debug/KLiteClientLogBuffer.java \
            runelite-client/src/main/java/net/runelite/client/plugins/klite/marketplace/KLiteMarketplacePersistenceService.java \
            runelite-client/src/main/java/net/runelite/client/plugins/klite/marketplace/KLiteStreamedPluginService.java
          if git diff --cached --quiet; then
            echo "PMD corrections are already installed."
            exit 0
          fi
          git commit -m "Fix client PMD failures blocking credit website builds"
          git push
